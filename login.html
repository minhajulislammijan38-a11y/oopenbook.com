<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - OpenBook</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">

  <div class="max-w-md w-full mx-auto p-6">
    <div class="bg-gray-900 rounded-3xl shadow-2xl p-10">

      <!-- Logo -->
      <div class="flex justify-center mb-8">
        <div class="w-16 h-16 bg-teal-500 rounded-2xl flex items-center justify-center text-4xl shadow-inner">
          📖
        </div>
      </div>

      <h1 class="text-4xl font-bold text-center mb-2">Welcome Back</h1>
      <p class="text-center text-gray-400 mb-10">OpenBook এ লগইন করুন</p>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm text-gray-400 mb-2"> ইমেইল</label>
          <input type="text" required
                 class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-teal-500 text-lg"
                 placeholder=" ইমেইল">
        </div>

        <div>
          <label class="block text-sm text-gray-400 mb-2">পাসওয়ার্ড</label>
          <input type="password" required
                 class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-teal-500 text-lg"
                 placeholder="••••••••">
        </div>

        <div class="flex justify-between items-center text-sm">
          <label class="flex items-center gap-2">
            <input type="checkbox" class="w-4 h-4 accent-teal-500">
            <span>আমাকে মনে রাখুন</span>
          </label>
          <a href="#" class="text-teal-400 hover:text-teal-300">পাসওয়ার্ড ভুলে গেছেন?</a>
        </div>

        <button type="submit"
                class="w-full bg-teal-600 hover:bg-teal-500 py-5 rounded-3xl text-xl font-bold transition">
          লগইন করুন
        </button>
      </form>

      <div class="text-center mt-8">
        <p class="text-gray-400">
          অ্যাকাউন্ট নেই? 
          <a href="register.html" class="text-teal-400 font-semibold hover:text-teal-300">রেজিস্টার করুন</a>
        </p>
      </div>

      <!-- Social Login -->
      <div class="mt-10">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-700"></div>
          </div>
          <div class="relative text-center">
            <span class="bg-gray-900 px-4 text-gray-500">অথবা</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert("✅ লগইন সফল হয়েছে!\n\nড্যাশবোর্ডে স্বাগতম");
      // পরে আপনি এখানে redirect করবেন dashboard.html এ
    });
  </script>
</body>
</html>
