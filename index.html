<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenBook - Online Coaching</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }
    .course-card {
      transition: all 0.3s ease;
    }
    .course-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <div class="max-w-7xl mx-auto p-6">

    <!-- Top Navigation -->
    <nav class="flex items-center justify-between bg-gray-900 rounded-2xl px-6 py-4 mb-8 shadow-xl">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-teal-500 rounded-xl flex items-center justify-center text-2xl font-bold">📖</div>
        <h1 class="text-2xl font-bold">OpenBook</h1>
      </div>

      <!-- Search Bar -->
      <div class="flex-1 max-w-xl mx-8">
        <div class="relative">
          <input type="text" 
                 placeholder="কোর্স বা সাবজেক্ট খুঁজুন..."
                 class="w-full bg-gray-800 text-white rounded-full py-3 px-6 pl-12 focus:outline-none focus:ring-2 focus:ring-teal-500">
          <i class="fas fa-search absolute left-5 top-3.5 text-gray-400"></i>
        </div>
      </div>

      <!-- Dark/Bright Toggle -->
      <div class="flex items-center gap-2 bg-gray-800 rounded-full px-4 py-2">
        <span class="text-sm font-medium">Dark</span>
        <div class="w-11 h-6 bg-teal-600 rounded-full relative cursor-pointer">
          <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow"></div>
        </div>
        <span class="text-sm font-medium text-teal-400">Bright</span>
      </div>
    </nav>

    <!-- Menu Tabs -->
    <div class="flex gap-8 border-b border-gray-800 pb-4 mb-8 text-lg">
      <a href="index.html" class="font-semibold text-teal-400 border-b-4 border-teal-400 pb-2">HOME</a>
      <a href="Exam.html" class="text-gray-400 hover:text-white transition">EXAM</a>
      <a href="questionbank.html" class="text-gray-400 hover:text-white transition">Question Bank</a>
      <a href="profile.html" class="text-gray-400 hover:text-white transition">Profile</a>
      <a href="setting.html" class="text-gray-400 hover:text-white transition">Setting</a>
    </div>

    <!-- Course Section -->
    <h2 class="text-3xl font-bold mb-8">COURSE</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Card 1 -->
      <div class="course-card bg-gray-900 rounded-3xl overflow-hidden">
        <img src="https://images.unsplash.com/photo-1606326608690-9e0e9e3e0c3e" 
             class="w-full h-48 object-cover" alt="Physics">
        <div class="p-6">
          <h3 class="text-xl font-semibold mb-2">HSC Physics</h3>
          <div class="w-full bg-gray-700 h-2 rounded-full mb-4">
            <div class="bg-teal-500 h-2 rounded-full w-[65%]"></div>
          </div>
          <button class="w-full bg-teal-600 hover:bg-teal-500 py-3 rounded-2xl font-medium transition">
            Enroll Now
          </button>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="course-card bg-gray-900 rounded-3xl overflow-hidden">
        <img src="https://images.unsplash.com/photo-1599669454699-248893623440" 
             class="w-full h-48 object-cover" alt="Math">
        <div class="p-6">
          <h3 class="text-xl font-semibold mb-2">SSC Mathematics</h3>
          <div class="w-full bg-gray-700 h-2 rounded-full mb-4">
            <div class="bg-teal-500 h-2 rounded-full w-[40%]"></div>
          </div>
          <button class="w-full bg-teal-600 hover:bg-teal-500 py-3 rounded-2xl font-medium transition">
            Enroll Now
          </button>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="course-card bg-gray-900 rounded-3xl overflow-hidden">
        <img src="https://images.unsplash.com/photo-1559757148-5e9951330c2d" 
             class="w-full h-48 object-cover" alt="Chemistry">
        <div class="p-6">
          <h3 class="text-xl font-semibold mb-2">HSC Chemistry</h3>
          <div class="w-full bg-gray-700 h-2 rounded-full mb-4">
            <div class="bg-teal-500 h-2 rounded-full w-[80%]"></div>
          </div>
          <button class="w-full bg-teal-600 hover:bg-teal-500 py-3 rounded-2xl font-medium transition">
            Enroll Now
          </button>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="course-card bg-gray-900 rounded-3xl overflow-hidden">
        <img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f" 
             class="w-full h-48 object-cover" alt="English">
        <div class="p-6">
          <h3 class="text-xl font-semibold mb-2">SSC English</h3>
          <div class="w-full bg-gray-700 h-2 rounded-full mb-4">
            <div class="bg-teal-500 h-2 rounded-full w-[25%]"></div>
          </div>
          <button class="w-full bg-teal-600 hover:bg-teal-500 py-3 rounded-2xl font-medium transition">
            Enroll Now
          </button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
